<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href ="./styles3.css" rel ="stylesheet">
  <title>Playing Cards</title>

</head>

<body>
    <main id="playing-cards">
        <div class="card">
            <div class="left">
                <p>A</p>
                <p>♠</p>
            </div>
            <div class="middle">
                <p>♠</p>
            </div>
            <div class="right">
                <p class="reverse">♠</p>
                <p class="reverse">A</p>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <p>2</p>
                <p>♣</p>
            </div>
            <div class="middle">
                <p>♣</p>
                <p class = "reverse">♣</p>
            </div>
            <div class="right">
                <p class="reverse">♣</p>
                <p class="reverse">2</p>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <p>3</p>
                <p>♥</p>
            </div>
            <div class="middle">
                <p>♥</p>
                <p>♥</p>
                <p class = "reverse">♥</p>
            </div>
            <div class="right">
                <p class="reverse">♥</p>
                <p class="reverse">3</p>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <p>4</p>
                <p>♣</p>
            </div>
            <div class="middle">
                <p>♣♣</p>
                <p class = "reverse">♣♣</p>
            </div>
            <div class="right">
                <p class="reverse">♣</p>
                <p class="reverse">4</p>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <p>5</p>
                <p>♦</p>
            </div>
            <div class="middle">
                <p>♦♦</p>
                <p class = "midOfMiddle">♦</p>
                <p>♦♦</p>
            </div>
            <div class="right">
                <p class="reverse">♦</p>
                <p class="reverse">5</p>
            </div>
        </div>
    </main>  
</body>
</html>
